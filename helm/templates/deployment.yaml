apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-insecure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      containers:
      - name: app
        image: nginx:latest
        ports:
        - containerPort: 80
